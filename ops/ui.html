<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CA OPS</title>
<style>
  /* ── Base ─────────────────────────────────────────────────────────────── */
  :root {
    --bg: #060809;
    --panel: #0b0e10;
    --panel-2: #0e1214;
    --line: #181e22;
    --line-soft: #12171a;
    --text: #c3ccd3;
    --dim: #5d6a72;
    --faint: #39434a;
    --ok: #3fbf74;
    --warn: #d9a13b;
    --bad: #e05252;
    --accent: #45c7db;
    --ok-bg: rgba(63,191,116,0.10);
    --warn-bg: rgba(217,161,59,0.10);
    --bad-bg: rgba(224,82,82,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    color: var(--text);
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 12.5px;
    line-height: 1.45;
    padding: 0 0 60px;
    font-variant-numeric: tabular-nums;
  }
  ::selection { background: rgba(69,199,219,0.25); }

  .wrap { max-width: 1320px; margin: 0 auto; padding: 0 22px; }

  .sec-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    margin: 30px 0 10px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .sec-label::after { content: ""; flex: 1; border-bottom: 1px solid var(--line-soft); transform: translateY(-3px); }
  .sec-note { color: var(--faint); font-size: 10px; letter-spacing: 0.05em; text-transform: none; }

  /* ── Header ───────────────────────────────────────────────────────────── */
  header {
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .hd {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 13px 0;
    flex-wrap: wrap;
  }
  .brand { font-size: 13px; letter-spacing: 0.20em; color: var(--text); white-space: nowrap; }
  .brand b { color: var(--accent); font-weight: 700; }
  .verdict {
    font-size: 12px;
    letter-spacing: 0.16em;
    padding: 4px 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    white-space: nowrap;
  }
  .verdict.go  { color: var(--ok);  border-color: rgba(63,191,116,0.4);  background: var(--ok-bg); }
  .verdict.bad { color: var(--bad); border-color: rgba(224,82,82,0.4);   background: var(--bad-bg); }
  .verdict.unknown { color: var(--dim); }
  .hd-right { margin-left: auto; display: flex; align-items: center; gap: 14px; color: var(--dim); font-size: 11px; white-space: nowrap; }
  .hd-right .num { color: var(--text); }
  button.refresh {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--accent);
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    border-radius: 3px;
    cursor: pointer;
  }
  button.refresh:hover { border-color: var(--accent); }
  button.refresh:active { transform: translateY(1px); }
  .issues-line { color: var(--bad); font-size: 11px; padding: 6px 0 10px; display: none; }
  .issues-line.show { display: block; }

  /* ── Status strip ─────────────────────────────────────────────────────── */
  .strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--panel);
    margin-top: 16px;
    overflow: hidden;
  }
  .stat {
    padding: 10px 14px;
    border-right: 1px solid var(--line-soft);
    min-width: 0;
  }
  .stat:last-child { border-right: none; }
  .stat .k { font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-bottom: 3px; }
  .stat .v { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat .sub { font-size: 10.5px; color: var(--dim); }

  /* ── Pills ────────────────────────────────────────────────────────────── */
  .pill {
    display: inline-block;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 1px 8px 2px;
    border-radius: 3px;
    border: 1px solid var(--line);
    color: var(--dim);
    vertical-align: 1px;
  }
  .pill.ok   { color: var(--ok);   border-color: rgba(63,191,116,0.35); background: var(--ok-bg); }
  .pill.warn { color: var(--warn); border-color: rgba(217,161,59,0.35); background: var(--warn-bg); }
  .pill.bad  { color: var(--bad);  border-color: rgba(224,82,82,0.35);  background: var(--bad-bg); }
  .tag-offshore {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 0 6px 1px;
    border-radius: 3px;
    border: 1px solid rgba(69,199,219,0.35);
    color: var(--accent);
    margin-left: 8px;
    vertical-align: 1px;
  }

  /* ── Tables ───────────────────────────────────────────────────────────── */
  .tbl-wrap { border: 1px solid var(--line); border-radius: 4px; background: var(--panel); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 9.5px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--panel-2);
    white-space: nowrap;
  }
  td { padding: 7px 12px; border-bottom: 1px solid var(--line-soft); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  td.dim { color: var(--dim); }
  td.num, th.num { text-align: right; }
  .empty-cell { color: var(--faint); }

  /* ── DOWN card ────────────────────────────────────────────────────────── */
  .down {
    border: 1px solid rgba(224,82,82,0.35);
    border-radius: 4px;
    background: var(--bad-bg);
    padding: 14px 16px;
    color: var(--bad);
    font-size: 12px;
  }
  .down .why { color: var(--dim); margin-top: 3px; font-size: 11px; }

  /* ── Coverage matrix ──────────────────────────────────────────────────── */
  .matrix td, .matrix th { padding: 7px 10px; }
  .matrix th.book-col { min-width: 300px; }
  .matrix .book-row { cursor: pointer; }
  .matrix .book-row:hover td { background: #0e1316; }
  .matrix .book-name { color: var(--text); font-size: 12.5px; }
  .matrix .book-meta { color: var(--dim); font-size: 10.5px; margin-top: 1px; }
  .matrix .caret { color: var(--faint); display: inline-block; width: 12px; transition: transform 0.12s; }
  .matrix .book-row.open .caret { transform: rotate(90deg); color: var(--accent); }
  .cell { text-align: center; min-width: 52px; border-radius: 3px; }
  td.c-fresh { color: var(--ok);   background: var(--ok-bg); }
  td.c-aging { color: var(--warn); background: var(--warn-bg); }
  td.c-stale { color: var(--bad);  background: var(--bad-bg); }
  td.c-none  { color: var(--faint); }
  .drawer-row td {
    background: var(--panel-2);
    padding: 12px 16px 14px 34px;
    white-space: normal;
    border-bottom: 1px solid var(--line);
  }
  .drawer-title { font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
  .drawer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 4px 24px; margin-bottom: 10px; }
  .drawer-grid .row { display: flex; justify-content: space-between; gap: 12px; font-size: 11.5px; }
  .drawer-grid .row .s { color: var(--dim); }
  .adapter-err { color: var(--bad); font-size: 11.5px; word-break: break-word; }
  .adapter-ok { color: var(--faint); font-size: 11.5px; }
  .legend { display: flex; gap: 16px; margin-top: 8px; font-size: 10px; color: var(--dim); }
  .legend .sw { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 5px; vertical-align: -1px; }

  /* ── Cell drill-down modal ────────────────────────────────────────────── */
  .modal-back {
    position: fixed; inset: 0; background: rgba(0,0,0,0.62); z-index: 50;
    display: flex; align-items: flex-start; justify-content: center; padding: 7vh 16px 16px;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--line); border-radius: 5px;
    width: min(860px, 100%); max-height: 82vh; display: flex; flex-direction: column;
  }
  .modal-hd {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    padding: 11px 16px; border-bottom: 1px solid var(--line);
  }
  .modal-hd .t { font-size: 12.5px; color: var(--text); letter-spacing: 0.04em; }
  .modal-hd .t b { color: var(--accent); text-transform: uppercase; }
  .modal-hd .x {
    background: none; border: 1px solid var(--line); color: var(--dim); border-radius: 3px;
    font: inherit; font-size: 11px; padding: 3px 10px; cursor: pointer;
  }
  .modal-hd .x:hover { color: var(--text); border-color: var(--dim); }
  .modal-bd { overflow: auto; padding: 6px 16px 14px; }
  .modal-bd table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
  .modal-bd th { text-align: left; font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); padding: 7px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  .modal-bd td { padding: 6px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; color: var(--text); }
  .modal-bd td.dim { color: var(--dim); }
  .modal-bd .mv { color: var(--warn); font-size: 10px; margin-left: 4px; }
  .modal-bd .f5tag { color: var(--accent); border: 1px solid var(--accent); border-radius: 3px; font-size: 9px; padding: 0 4px; margin-left: 6px; }
  .modal-bd .empty { color: var(--dim); padding: 18px 8px; }
  .matrix td.cell:not(.c-none):hover { outline: 1px solid var(--accent); cursor: pointer; }

  /* ── Reader card ──────────────────────────────────────────────────────── */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
  .card { border: 1px solid var(--line); border-radius: 4px; background: var(--panel); padding: 12px 16px; }
  .card .k { font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
  .card .big { font-size: 17px; color: var(--text); }
  .card .sub { font-size: 11px; color: var(--dim); margin-top: 3px; word-break: break-word; white-space: normal; }
  .card .err { color: var(--bad); }
  .spend { color: var(--accent); }
</style>
</head>
<body>
<header>
  <div class="wrap hd">
    <div class="brand"><b>CA</b> OPS CONSOLE</div>
    <div class="verdict unknown" id="verdict">CONNECTING</div>
    <div class="hd-right">
      <span>updated <span class="num" id="stamp">never</span></span>
      <span>next in <span class="num" id="countdown">--</span>s</span>
      <button class="refresh" id="refreshBtn" type="button">refresh</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="issues-line" id="issuesLine"></div>

  <div id="stripHost"></div>

  <div class="sec-label">Mac processes <span class="sec-note" id="pm2Note"></span></div>
  <div id="pm2Host"></div>

  <div class="sec-label">Heartbeats</div>
  <div id="hbHost"></div>

  <div class="sec-label">Book coverage matrix <span class="sec-note">cells are games with lines, colored by newest update age. click a book for detail</span></div>
  <div id="matrixHost"></div>

  <div class="sec-label">Data sources</div>
  <div id="sourcesHost"></div>

  <div class="sec-label">Capper sources <span class="sec-note">scanner ingestion by system, ratings, fades, tracked-tier drift</span></div>
  <div id="cappersHost"></div>

  <div class="sec-label">Reader and spend</div>
  <div id="readerHost"></div>
</div>

<script>
'use strict';

/* ── Constants ──────────────────────────────────────────────────────────── */
var REFRESH_SEC = 30;
var FRESH_MIN = 90;    // cell age <= 90 min: fresh
var AGING_MIN = 360;   // cell age <= 6 h: aging; beyond: stale
var PINNED_PM2 = ['odds-engine', 'pb-relay'];
var SPORT_ORDER = ['MLB', 'NBA', 'WNBA', 'NHL', 'NFL', 'NCAAF', 'CBB', 'ATP', 'WTA', 'TENNIS', 'GOLF'];

var expandedBooks = {};   // book name -> true, survives re-renders
var countdown = REFRESH_SEC;
var lastData = null;

/* ── Tiny helpers ───────────────────────────────────────────────────────── */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function num(n, d) { return (typeof n === 'number' && isFinite(n)) ? n : (d === undefined ? null : d); }
function el(id) { return document.getElementById(id); }

function fmtAge(min) {
  var m = num(min);
  if (m == null) return '—';
  if (m < 1) return 'now';
  if (m < 60) return Math.round(m) + 'm';
  if (m < 48 * 60) { var h = Math.floor(m / 60); var r = Math.round(m % 60); return h + 'h' + (r ? ' ' + r + 'm' : ''); }
  return Math.round(m / 1440) + 'd';
}
function fmtUptime(ms) {
  var v = num(ms);
  if (v == null || v <= 0) return '—';
  var s = Math.floor(v / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  if (s < 86400) return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
  return Math.floor(s / 86400) + 'd ' + Math.floor((s % 86400) / 3600) + 'h';
}
function fmtMem(bytes) {
  var b = num(bytes);
  if (b == null) return '—';
  if (b < 1048576) return Math.round(b / 1024) + ' KB';
  if (b < 1073741824) return Math.round(b / 1048576) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}
function fmtTime(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  var now = new Date();
  var hm = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  if (d.toDateString() === now.toDateString()) return hm;
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + hm;
}
function fmtPct(p) {
  var v = num(p);
  if (v == null) return '—';
  return Math.round(v) + '%';
}
function pill(status) {
  var s = String(status || '').toLowerCase();
  if (s === 'ok' || s === 'online' || s === 'green') return '<span class="pill ok">' + esc(s) + '</span>';
  if (s === 'yellow' || s === 'warn' || s === 'launching' || s === 'aging') return '<span class="pill warn">' + esc(s) + '</span>';
  if (s === 'red' || s === 'never' || s === 'errored' || s === 'stopped' || s === 'down' || s === 'stale') return '<span class="pill bad">' + esc(s) + '</span>';
  return '<span class="pill">' + esc(s || 'unknown') + '</span>';
}
function downCard(what, why) {
  return '<div class="down">' + esc(what) + ' is DOWN' +
    (why ? '<div class="why">' + esc(why) + '</div>' : '') + '</div>';
}
function parseMeta(meta) {
  if (meta == null) return null;
  if (typeof meta === 'object') return meta;
  if (typeof meta === 'string') { try { return JSON.parse(meta); } catch (e) { return { raw: meta }; } }
  return null;
}
function metaToText(meta) {
  var m = parseMeta(meta);
  if (!m) return '—';
  if (typeof m !== 'object') return String(m);
  var parts = [];
  for (var k in m) {
    if (!Object.prototype.hasOwnProperty.call(m, k)) continue;
    var v = m[k];
    if (v == null) continue;
    if (typeof v === 'object') { try { v = JSON.stringify(v); } catch (e) { v = '[object]'; } }
    parts.push(k + ': ' + v);
    if (parts.length >= 6) break;
  }
  return parts.length ? parts.join('  ·  ') : '—';
}

/* ── Issue counting ─────────────────────────────────────────────────────── */
function collectIssues(d) {
  var issues = [];
  if (!d.site || !d.site.reachable) issues.push('site unreachable (' + ((d.site && d.site.url) || '?') + ')');
  if (d.health && d.health.error) {
    issues.push('health.json failed: ' + d.health.error);
  } else if (d.health) {
    (d.health.sources || []).forEach(function (s) {
      if (!s) return;
      var st = String(s.status || '').toLowerCase();
      if (st === 'red' || st === 'never') issues.push('source ' + (s.name || '?') + ' is ' + st);
    });
    (d.health.heartbeats || []).forEach(function (h) {
      if (!h) return;
      var st = String(h.status || '').toLowerCase();
      if (st === 'red' || st === 'never' || st === 'down') issues.push('heartbeat ' + (h.service || '?') + ' is ' + st);
    });
  }
  if (d.books && d.books.error) issues.push('books.json failed: ' + d.books.error);
  if (d.cappers && d.cappers.drift && d.cappers.drift.alarm) issues.push('tracked tier below breakeven over trailing 30d');
  if (d.pm2) {
    if (d.pm2.note && (!d.pm2.processes || !d.pm2.processes.length)) issues.push(d.pm2.note);
    (d.pm2.processes || []).forEach(function (p) {
      if (p && p.status !== 'online') issues.push('pm2 ' + p.name + ' is ' + p.status);
    });
  }
  var disk = d.host && d.host.disk;
  if (disk && !disk.error && num(disk.used_pct) != null && disk.used_pct >= 90) issues.push('disk ' + disk.used_pct + '% full');
  return issues;
}

/* ── Renderers ──────────────────────────────────────────────────────────── */
function renderStrip(d) {
  var site = d.site || {};
  var host = d.host || {};
  var disk = host.disk || {};
  var load = Array.isArray(host.load) ? host.load : [];
  var sitePill = site.reachable ? '<span class="pill ok">up</span>' : '<span class="pill bad">down</span>';
  var diskV = disk.error ? '<span style="color:var(--bad)">unavailable</span>'
    : esc((num(disk.free_gb) != null ? disk.free_gb : '?') + ' GB free');
  var diskSub = disk.error ? esc(disk.error)
    : (num(disk.used_pct) != null ? disk.used_pct + '% used of ' + (num(disk.total_gb) != null ? disk.total_gb : '?') + ' GB' : '');

  el('stripHost').innerHTML =
    '<div class="strip">' +
      '<div class="stat"><div class="k">Site</div><div class="v">' + sitePill + ' ' + esc(site.url || '?') + '</div>' +
        '<div class="sub">' + (site.reachable ? (site.loggedIn ? 'admin session active' : 'reachable, not logged in yet') : esc(site.error || 'no response')) + '</div></div>' +
      '<div class="stat"><div class="k">Mac host</div><div class="v">' + esc(host.hostname || '?') + '</div>' +
        '<div class="sub">' + (num(host.cpus) != null ? host.cpus + ' cores' : '') + '</div></div>' +
      '<div class="stat"><div class="k">Load 1m / 5m / 15m</div><div class="v">' +
        esc(load.length ? load.join(' / ') : '—') + '</div><div class="sub">&nbsp;</div></div>' +
      '<div class="stat"><div class="k">Disk /</div><div class="v">' + diskV + '</div>' +
        '<div class="sub">' + diskSub + '&nbsp;</div></div>' +
    '</div>';
}

function renderPm2(d) {
  var pm2 = d.pm2 || {};
  var procs = (pm2.processes || []).slice();
  el('pm2Note').textContent = pm2.note || '';
  if (!procs.length) {
    el('pm2Host').innerHTML = downCard('pm2 process list', pm2.note || 'no processes reported');
    return;
  }
  procs.sort(function (a, b) {
    var ai = PINNED_PM2.indexOf(a.name), bi = PINNED_PM2.indexOf(b.name);
    if (ai !== -1 || bi !== -1) {
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    }
    return String(a.name).localeCompare(String(b.name));
  });
  var rows = procs.map(function (p) {
    return '<tr>' +
      '<td>' + esc(p.name) + '</td>' +
      '<td>' + pill(p.status) + '</td>' +
      '<td class="num">' + fmtUptime(p.uptime_ms) + '</td>' +
      '<td class="num">' + (num(p.restarts) != null ? p.restarts : '—') + '</td>' +
      '<td class="num">' + fmtMem(p.memory) + '</td>' +
    '</tr>';
  }).join('');
  el('pm2Host').innerHTML =
    '<div class="tbl-wrap"><table>' +
      '<thead><tr><th>process</th><th>status</th><th class="num">uptime</th><th class="num">restarts</th><th class="num">memory</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table></div>';
}

function renderHeartbeats(d) {
  var health = d.health || {};
  if (health.error) { el('hbHost').innerHTML = downCard('health.json', health.error); return; }
  var hbs = health.heartbeats || [];
  if (!hbs.length) { el('hbHost').innerHTML = '<div class="card"><div class="sub">No heartbeats reported yet.</div></div>'; return; }
  var rows = hbs.map(function (h) {
    if (!h) return '';
    return '<tr>' +
      '<td>' + esc(h.service || '?') + '</td>' +
      '<td class="num">' + fmtTime(h.lastSeen) + ' <span class="dim">(' + fmtAge(h.ageMin) + ' ago)</span></td>' +
      '<td class="dim" style="white-space:normal;max-width:520px">' + esc(metaToText(h.meta)) + '</td>' +
      '<td>' + pill(h.status) + '</td>' +
    '</tr>';
  }).join('');
  el('hbHost').innerHTML =
    '<div class="tbl-wrap"><table>' +
      '<thead><tr><th>service</th><th class="num">last check-in</th><th>last cycle</th><th>status</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table></div>';
}

function cellClass(ageMin, games) {
  if (num(games) == null || games <= 0) return 'c-none';
  var m = num(ageMin);
  if (m == null) return 'c-none';
  if (m <= FRESH_MIN) return 'c-fresh';
  if (m <= AGING_MIN) return 'c-aging';
  return 'c-stale';
}

function adapterErrorsFor(bookName, heartbeats) {
  var out = [];
  var b = String(bookName || '').toLowerCase();
  (heartbeats || []).forEach(function (hb) {
    if (!hb) return;
    var meta = parseMeta(hb.meta);
    if (!meta || typeof meta !== 'object') return;
    ['errors', 'adapter_errors', 'book_errors'].forEach(function (key) {
      var map = meta[key];
      if (map && typeof map === 'object' && !Array.isArray(map)) {
        for (var k in map) {
          if (Object.prototype.hasOwnProperty.call(map, k) && String(k).toLowerCase() === b && map[k]) {
            out.push(String(map[k]));
          }
        }
      }
    });
    if (String(hb.service || '').toLowerCase().indexOf(b) !== -1) {
      ['error', 'last_error', 'lastError'].forEach(function (key) {
        if (meta[key]) out.push(String(meta[key]));
      });
    }
  });
  return out;
}

function renderMatrix(d) {
  var books = d.books || {};
  if (books.error) { el('matrixHost').innerHTML = downCard('books.json', books.error); return; }
  var list = books.books || [];
  if (!list.length) { el('matrixHost').innerHTML = '<div class="card"><div class="sub">No book data yet.</div></div>'; return; }

  // Column set: union of sports across all books, in preferred order.
  var seen = {};
  list.forEach(function (bk) {
    ((bk && bk.sports) || []).forEach(function (s) {
      if (s && s.sport) seen[String(s.sport)] = true;
    });
  });
  var sports = Object.keys(seen).sort(function (a, b) {
    var ai = SPORT_ORDER.indexOf(a.toUpperCase()), bi = SPORT_ORDER.indexOf(b.toUpperCase());
    if (ai === -1 && bi === -1) return a.localeCompare(b);
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  var heartbeats = (d.health && !d.health.error && d.health.heartbeats) || [];

  var head = '<tr><th class="book-col">book</th>' +
    sports.map(function (s) { return '<th class="cell">' + esc(s) + '</th>'; }).join('') + '</tr>';

  var body = list.map(function (bk, idx) {
    if (!bk) return '';
    var name = bk.book || ('book ' + idx);
    var mk = bk.markets || {};
    var bySport = {};
    (bk.sports || []).forEach(function (s) { if (s && s.sport) bySport[String(s.sport)] = s; });

    var meta = [
      (num(bk.total_games) != null ? bk.total_games : '?') + ' games',
      'ML ' + fmtPct(mk.ml_pct) + ' · SP ' + fmtPct(mk.spread_pct) + ' · TOT ' + fmtPct(mk.total_pct),
      'newest ' + fmtAge(bk.ageMin) + ' ago',
    ].join('   ');

    var cells = sports.map(function (sp) {
      var s = bySport[sp];
      if (!s || num(s.games) == null || s.games <= 0) {
        return '<td class="cell c-none"><span class="empty-cell">—</span></td>';
      }
      var cls = cellClass(s.ageMin, s.games);
      var tip = sp + ': ' + s.games + ' games, newest ' + fmtTime(s.newest) + ' (' + fmtAge(s.ageMin) + ' ago). Click for the lines.';
      return '<td class="cell ' + cls + '" data-book="' + esc(name) + '" data-sport="' + esc(sp) + '" title="' + esc(tip) + '">' + esc(s.games) + '</td>';
    }).join('');

    var isOpen = !!expandedBooks[name];
    var rowHtml =
      '<tr class="book-row' + (isOpen ? ' open' : '') + '" data-book="' + esc(name) + '">' +
        '<td><span class="caret">&#9656;</span><span class="book-name">' + esc(name) + '</span>' +
          (bk.offshore ? '<span class="tag-offshore">offshore</span>' : '') +
          '<div class="book-meta">' + esc(meta) + '</div></td>' +
        cells +
      '</tr>';

    var drawerHtml = '';
    if (isOpen) {
      var sportRows = (bk.sports || []).map(function (s) {
        if (!s) return '';
        return '<div class="row"><span class="s">' + esc(s.sport || '?') + '</span>' +
          '<span>' + fmtTime(s.newest) + ' <span class="s">(' + fmtAge(s.ageMin) + ' ago, ' +
          (num(s.games) != null ? s.games : '?') + ' games)</span></span></div>';
      }).join('');
      var errs = adapterErrorsFor(name, heartbeats);
      var errHtml = errs.length
        ? errs.map(function (e) { return '<div class="adapter-err">' + esc(e) + '</div>'; }).join('')
        : '<div class="adapter-ok">No adapter errors reported in heartbeat meta.</div>';
      drawerHtml =
        '<tr class="drawer-row"><td colspan="' + (sports.length + 1) + '">' +
          '<div class="drawer-title">Per-sport newest updates</div>' +
          '<div class="drawer-grid">' + (sportRows || '<div class="adapter-ok">No per-sport data.</div>') + '</div>' +
          '<div class="drawer-title">Adapter errors</div>' + errHtml +
        '</td></tr>';
    }
    return rowHtml + drawerHtml;
  }).join('');

  // Depth lanes: player props per book + the non-ESPN event lane (esports,
  // MMA, boxing...). One compact line each; empty until those relays flow.
  var depthHtml = '';
  var props = books.props || [];
  if (props.length) {
    depthHtml += '<div class="book-meta" style="margin-top:8px;">PROPS   ' +
      props.map(function (p) {
        return esc(p.book) + ' ' + esc(p.rows) + ' rows/' + esc(p.games) + ' games (' + fmtAge(p.ageMin) + ')';
      }).join('   ') + '</div>';
  }
  var lane = books.eventLane || [];
  if (lane.length) {
    depthHtml += '<div class="book-meta" style="margin-top:4px;">EVENT LANE   ' +
      lane.map(function (e) {
        return esc(e.sport) + ' ' + esc(e.events) + ' events x ' + esc(e.books) + ' books (' + fmtAge(e.ageMin) + ')';
      }).join('   ') + '</div>';
  }

  el('matrixHost').innerHTML =
    '<div class="tbl-wrap"><table class="matrix"><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>' +
    '<div class="legend">' +
      '<span><span class="sw" style="background:var(--ok-bg);border:1px solid var(--ok)"></span>fresh (under ' + FRESH_MIN + 'm)</span>' +
      '<span><span class="sw" style="background:var(--warn-bg);border:1px solid var(--warn)"></span>aging (under ' + (AGING_MIN / 60) + 'h)</span>' +
      '<span><span class="sw" style="background:var(--bad-bg);border:1px solid var(--bad)"></span>stale</span>' +
      '<span><span class="sw" style="border:1px solid var(--faint)"></span>no lines</span>' +
    '</div>' + depthHtml;

  // Row click toggles drawer. Re-render just the matrix so state applies.
  Array.prototype.forEach.call(document.querySelectorAll('.matrix .book-row'), function (row) {
    row.addEventListener('click', function () {
      var name = row.getAttribute('data-book');
      expandedBooks[name] = !expandedBooks[name];
      if (lastData) renderMatrix(lastData);
    });
  });
  // Cell click opens the drill-down popup (and must not toggle the row drawer).
  Array.prototype.forEach.call(document.querySelectorAll('.matrix td.cell[data-sport]'), function (cell) {
    cell.addEventListener('click', function (ev) {
      ev.stopPropagation();
      openCellModal(cell.getAttribute('data-book'), cell.getAttribute('data-sport'));
    });
  });
}

/* ── Matrix cell drill-down modal ───────────────────────────────────────── */
function closeCellModal() {
  var m = document.getElementById('cellModal');
  if (m) m.remove();
  document.removeEventListener('keydown', cellModalEsc);
}
function cellModalEsc(e) { if (e.key === 'Escape') closeCellModal(); }

function openCellModal(book, sport) {
  closeCellModal();
  var back = document.createElement('div');
  back.className = 'modal-back';
  back.id = 'cellModal';
  back.innerHTML =
    '<div class="modal">' +
      '<div class="modal-hd"><span class="t"><b>' + esc(book) + '</b> · ' + esc(sport) + ' lines recorded on the CA site</span>' +
      '<button class="x" type="button">close</button></div>' +
      '<div class="modal-bd"><div class="empty">loading…</div></div>' +
    '</div>';
  document.body.appendChild(back);
  back.addEventListener('click', function (e) { if (e.target === back) closeCellModal(); });
  back.querySelector('.x').addEventListener('click', closeCellModal);
  document.addEventListener('keydown', cellModalEsc);

  fetch('/api/book-cell?book=' + encodeURIComponent(book) + '&sport=' + encodeURIComponent(sport))
    .then(function (r) { return r.json(); })
    .then(function (j) {
      var bd = back.querySelector('.modal-bd');
      if (!bd) return;
      if (j.error) { bd.innerHTML = '<div class="empty">Error: ' + esc(j.error) + '</div>'; return; }
      var games = j.games || [];
      if (!games.length) { bd.innerHTML = '<div class="empty">No ' + esc(sport) + ' lines stored for ' + esc(book) + '.</div>'; return; }
      var odds = function (v) { return v == null ? '—' : (v > 0 ? '+' + v : String(v)); };
      var line = function (v) { return v == null ? '—' : (v > 0 ? '+' + v : String(v)); };
      var mv = function (cur, prev) {
        if (prev == null || cur == null || cur === prev) return '';
        var d = Math.round((cur - prev) * 10) / 10;
        return '<span class="mv">' + (d > 0 ? '+' : '') + d + '</span>';
      };
      var rows = games.map(function (g) {
        var p = g.prev || {};
        var tags = (g.periods || (g.f5 ? ['F5'] : [])).map(function (per) {
          return '<span class="f5tag">' + esc(per) + '</span>';
        }).join('');
        if (g.props) tags += '<span class="f5tag" title="prop rows stored">' + esc(g.props) + ' props</span>';
        return '<tr>' +
          '<td>' + esc(g.matchup) + tags + '</td>' +
          '<td class="dim">' + fmtTime(g.start_time) + '</td>' +
          '<td class="dim">' + esc(g.status || '—') + '</td>' +
          '<td>' + odds(g.ml_home) + mv(g.ml_home, p.ml_home) + ' / ' + odds(g.ml_away) + mv(g.ml_away, p.ml_away) + '</td>' +
          '<td>' + line(g.spread_home) + mv(g.spread_home, p.spread_home) + ' / ' + line(g.spread_away) + mv(g.spread_away, p.spread_away) + '</td>' +
          '<td>' + (g.over_under == null ? '—' : g.over_under + ' (' + odds(g.ou_over_odds) + '/' + odds(g.ou_under_odds) + ')') + mv(g.over_under, p.over_under) + '</td>' +
          '<td class="dim">' + fmtAge(g.ageMin) + ' ago</td>' +
        '</tr>';
      }).join('');
      var fallbackNote = j.fallback
        ? '<div class="empty" style="padding:8px;">Lines pulled from the public API (the site build with sent-to-site times is not deployed yet).</div>'
        : '';
      bd.innerHTML =
        '<table><thead><tr>' +
        '<th>matchup</th><th>starts</th><th>status</th><th>ml h/a</th><th>spread h/a</th><th>total (o/u)</th><th>sent to site</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>' + fallbackNote;
    })
    .catch(function (e) {
      var bd = back.querySelector('.modal-bd');
      if (bd) bd.innerHTML = '<div class="empty">Fetch failed: ' + esc(e && e.message || 'unknown') + '</div>';
    });
}

function renderSources(d) {
  var health = d.health || {};
  if (health.error) { el('sourcesHost').innerHTML = downCard('health.json', health.error); return; }
  var sources = health.sources || [];
  if (!sources.length) { el('sourcesHost').innerHTML = '<div class="card"><div class="sub">No sources reported yet.</div></div>'; return; }
  var rows = sources.map(function (s) {
    if (!s) return '';
    return '<tr>' +
      '<td>' + esc(s.name || '?') + '</td>' +
      '<td class="num">' + fmtAge(s.ageMin) + (num(s.expectMin) != null ? ' <span class="dim">/ expect ' + fmtAge(s.expectMin) + '</span>' : '') + '</td>' +
      '<td class="dim" style="white-space:normal;max-width:420px">' + esc(s.detail || '—') + '</td>' +
      '<td class="dim" style="white-space:normal;max-width:320px">' + esc(s.hint || '—') + '</td>' +
      '<td>' + pill(s.status) + '</td>' +
    '</tr>';
  }).join('');
  el('sourcesHost').innerHTML =
    '<div class="tbl-wrap"><table>' +
      '<thead><tr><th>source</th><th class="num">age</th><th>detail</th><th>hint</th><th>status</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table></div>';
}

function findSpend(obj, depth) {
  // Look for a numeric spend/cost value in health.json, at most 2 levels deep.
  if (!obj || typeof obj !== 'object' || depth > 2) return null;
  for (var k in obj) {
    if (!Object.prototype.hasOwnProperty.call(obj, k)) continue;
    var v = obj[k];
    if (/spend|cost/i.test(k) && typeof v === 'number' && isFinite(v)) return v;
    if (v && typeof v === 'object' && !Array.isArray(v) && /spend|cost|reader|haiku/i.test(k)) {
      var inner = findSpend(v, depth + 1);
      if (inner != null) return inner;
    }
  }
  return null;
}

function renderCappers(d) {
  var c = d.cappers || {};
  if (c.error) { el('cappersHost').innerHTML = downCard('capper-sources.json', c.error); return; }
  if (!c.ratings) { el('cappersHost').innerHTML = '<div class="card"><div class="sub">No capper data yet (endpoint not deployed?).</div></div>'; return; }

  var cards = '';
  var r = c.ratings || {};
  cards += '<div class="card"><div class="k">Ratings</div>' +
    '<div class="big">' + esc(String(r.cappers || 0)) + ' cappers</div>' +
    '<div class="sub">' + esc(String(r.rated || 0)) + ' rated · ' + esc(String(r.proven || 0)) + ' proven · recomputed ' + esc((r.computed_at || '—').slice(5, 16)) + '</div></div>';

  var fw = r.fade_watch || 0, fa = r.fade_active || 0;
  var fadeNames = (c.fadeList || []).map(function (f) {
    return esc(f.canonical_name) + ' (' + esc(String(f.blend_pct)) + '%, ' + esc(String(f.picks)) + 'p' + (f.fade === 'active' ? ', ACTIVE' : '') + ')';
  }).join(' · ');
  cards += '<div class="card"><div class="k">Fade list</div>' +
    '<div class="big' + (fa ? ' err' : '') + '">' + fa + ' active / ' + fw + ' watch</div>' +
    '<div class="sub" style="white-space:normal">' + (fadeNames || 'nobody qualifies') + '</div></div>';

  var dr = c.drift || {};
  var dn = (dr.wins || 0) + (dr.losses || 0);
  var dpct = dn ? Math.round(100 * (dr.wins || 0) / dn) : null;
  cards += '<div class="card"><div class="k">Tracked tier, trailing 30d</div>' +
    '<div class="big' + (dr.alarm ? ' err' : '') + '">' + (dn ? (dr.wins + '-' + dr.losses + ' (' + dpct + '%)') : 'no graded picks') + '</div>' +
    '<div class="sub">' + (dr.alarm ? 'ALARM: below breakeven over a meaningful sample' : 'drift monitor, ' + esc(dr.tier || '')) + '</div></div>';

  var reg = c.registry || {};
  cards += '<div class="card"><div class="k">Identity registry</div>' +
    '<div class="big">' + esc(String(reg.cappers || 0)) + '</div>' +
    '<div class="sub">' + esc(String(reg.handles || 0)) + ' source handles · ' + esc(String(c.unresolved24h || 0)) + ' unresolved names (24h)</div></div>';

  var srcRows = (c.sources || []).map(function (s) {
    var stale = !s.rows_24h;
    return '<tr>' +
      '<td>' + esc(s.source || '?') + '</td>' +
      '<td class="num">' + esc(String(s.rows_24h || 0)) + '</td>' +
      '<td class="num">' + esc(String(s.rows_total || 0)) + '</td>' +
      '<td class="dim">' + esc((s.last_write || '—').slice(0, 16)) + '</td>' +
      '<td>' + pill(stale ? 'quiet' : 'ok') + '</td>' +
    '</tr>';
  }).join('');
  var srcTable = srcRows
    ? '<div class="tbl-wrap" style="margin-top:10px"><table>' +
      '<thead><tr><th>system</th><th class="num">graded 24h</th><th class="num">total</th><th>last write</th><th>status</th></tr></thead>' +
      '<tbody>' + srcRows + '</tbody></table></div>'
    : '';

  el('cappersHost').innerHTML = '<div class="cards">' + cards + '</div>' + srcTable;
}

function renderReader(d) {
  var health = d.health || {};
  if (health.error) { el('readerHost').innerHTML = downCard('health.json', health.error); return; }

  var src = (health.sources || []).find(function (s) { return s && /reader/i.test(s.name || ''); }) || null;
  var hb = (health.heartbeats || []).find(function (h) { return h && /reader/i.test(h.service || ''); }) || null;
  var hbMeta = hb ? (parseMeta(hb.meta) || {}) : {};
  var readerObj = (health.reader && typeof health.reader === 'object') ? health.reader : {};

  var path = readerObj.path || readerObj.mode || hbMeta.path || hbMeta.reader_path || hbMeta.mode || null;
  var lastError = readerObj.last_error || readerObj.lastError || hbMeta.last_error || hbMeta.lastError || hbMeta.error || null;
  var spend = findSpend(health, 0);
  var srcLine = src ? ((src.detail || '') + (src.hint ? ' · ' + src.hint : '')) : null;
  var srcStatus = src ? src.status : (hb ? hb.status : null);

  var cards = '';
  cards += '<div class="card"><div class="k">Reader path</div>' +
    '<div class="big">' + esc(path || 'not reported') + '</div>' +
    '<div class="sub">' + (srcStatus ? pill(srcStatus) + ' ' : '') + esc(srcLine || (hb ? 'from heartbeat ' + (hb.service || '') : 'no reader entry in health.json')) + '</div></div>';
  cards += '<div class="card"><div class="k">Last reader error</div>' +
    (lastError
      ? '<div class="big err">error</div><div class="sub err">' + esc(lastError) + '</div>'
      : '<div class="big">none</div><div class="sub">no error reported</div>') + '</div>';
  cards += '<div class="card"><div class="k">Haiku spend today</div>' +
    (spend != null
      ? '<div class="big spend">$' + esc(spend.toFixed(4)) + '</div><div class="sub">from health.json</div>'
      : '<div class="big">—</div><div class="sub">not present in health.json</div>') + '</div>';

  el('readerHost').innerHTML = '<div class="cards">' + cards + '</div>';
}

function renderAll(d) {
  lastData = d;
  var issues = collectIssues(d);
  var v = el('verdict');
  if (issues.length) {
    v.textContent = issues.length + (issues.length === 1 ? ' ISSUE' : ' ISSUES');
    v.className = 'verdict bad';
  } else {
    v.textContent = 'ALL SYSTEMS GO';
    v.className = 'verdict go';
  }
  var il = el('issuesLine');
  if (issues.length) {
    il.textContent = issues.join('   ·   ');
    il.className = 'issues-line show';
  } else {
    il.className = 'issues-line';
  }

  renderStrip(d);
  renderPm2(d);
  renderHeartbeats(d);
  renderMatrix(d);
  renderSources(d);
  renderCappers(d);
  renderReader(d);

  var t = new Date();
  el('stamp').textContent = String(t.getHours()).padStart(2, '0') + ':' +
    String(t.getMinutes()).padStart(2, '0') + ':' + String(t.getSeconds()).padStart(2, '0');
}

/* ── Fetch loop ─────────────────────────────────────────────────────────── */
var fetching = false;

function refresh() {
  if (fetching) return;
  fetching = true;
  countdown = REFRESH_SEC;
  fetch('/api/summary', { cache: 'no-store' })
    .then(function (r) { return r.json(); })
    .then(function (d) { renderAll(d); })
    .catch(function (err) {
      var v = el('verdict');
      v.textContent = 'OPS SERVER ERROR';
      v.className = 'verdict bad';
      var il = el('issuesLine');
      il.textContent = 'could not reach /api/summary: ' + (err && err.message ? err.message : 'unknown');
      il.className = 'issues-line show';
    })
    .finally(function () { fetching = false; });
}

setInterval(function () {
  countdown -= 1;
  if (countdown <= 0) { refresh(); return; }
  el('countdown').textContent = countdown;
}, 1000);

el('refreshBtn').addEventListener('click', refresh);
document.addEventListener('visibilitychange', function () {
  if (!document.hidden && countdown < REFRESH_SEC - 5) refresh();
});

refresh();
</script>
</body>
</html>
